services:
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    command: ["-host", "0.0.0.0", "-config", "/config/toxiproxy.json"]
    ports:
      - "127.0.0.1:${TOXIPROXY_API_PORT:-8474}:8474"
      - "127.0.0.1:${TOXIPROXY_SMTP_PORT:-2526}:2526"
    volumes:
      - ./toxiproxy/toxiproxy.json:/config/toxiproxy.json:ro,Z
    depends_on:
      - mailpit

  mailpit:
    image: axllent/mailpit:v1.30.4
    ports:
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"

  haraka:
    build: ./haraka
    ports:
      - "127.0.0.1:${SMTP_PORT:-2525}:2525"
      - "127.0.0.1:${METRICS_PORT:-9090}:9090"
    environment:
      UPSTREAM_HOST: ${UPSTREAM_HOST:-toxiproxy}
      UPSTREAM_PORT: ${UPSTREAM_PORT:-2526}
      SENDER_MX_HOST: ${SENDER_MX_HOST:-mailpit}
      SENDER_MX_PORT: ${SENDER_MX_PORT:-1025}
      QUEUE_MAX_DEPTH: ${QUEUE_MAX_DEPTH:-200}
      RETRY_INTERVAL: ${RETRY_INTERVAL:-30s*20}
      DEAD_LETTER_DIR: ${DEAD_LETTER_DIR:-/data/dead-letter}
    volumes:
      - haraka-queue:/data/queue
      # Separate volume on purpose: dead-lettered mail must outlive anything
      # that clears the working queue.
      - haraka-dead-letter:/data/dead-letter
    depends_on:
      - toxiproxy
      - mailpit

  prometheus:
    image: prom/prometheus:v2.53.1
    entrypoint: ["/bin/sh", "/etc/prometheus/docker-entrypoint.sh"]
    environment:
      QUEUE_AGE_THRESHOLD: ${QUEUE_AGE_THRESHOLD:-60}
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ./prometheus:/etc/prometheus:ro,Z
      - prom-data:/prometheus
    depends_on:
      - haraka

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro,Z
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro,Z
    depends_on:
      - prometheus

volumes:
  haraka-queue:
  haraka-dead-letter:
  prom-data:
